dataset:
  name: bci_iv_2a
  moabb_class: BNCI2014_001
  events:
  - left_hand
  - right_hand
  - feet
  - tongue
  subjects: null
preprocess:
  fmin: 8.0
  fmax: 30.0
  tmin: 0.5
  tmax: 3.5
  resample: null
  drop_eog: true
  scale: 1000000.0
  covariance:
    estimator: scm
    epsilon: 1.0e-06
protocol:
  name: loso
  target_data_usage: transductive_unlabeled_all
  online_prefix_n_trials: 20
  few_shot_n_trials: 10
method:
  name: ifsa
  lambda_track: 4.0
  lambda_spec: 0.0
  lambda_damp: 0.0
  cov_trace_norm: false
  cov_shrink_alpha: 0.0
  cov_log_spec_shrink: 0.1
  mean_mode: logeuclid
  target_beta: 1.0
  lambda_u: 0.0
  k_steps: 1
  lr: 0.3
  ema_alpha: 1.0
  a_mix_mode: euclid
  trigger_tau: 0.0
  trigger_mode: fixed
  trigger_quantile: 0.7
  damp_mode: euclid_ema
  output_space: reference
  ref_subject_mean_mode: logeuclid
model:
  name: csp_lda
  n_components: 6
  reg: ledoit_wolf
runtime:
  seed: 42
  n_jobs: 1
  cache_dir: data/cache
  results_dir: results
  capture_env: true
experiment_name: ifsa_v15_tg_beta1_full_covlogsh0p1
eval:
  compute_baseline: true
  baseline_method: identity
