# @package _global_

defaults:
  - override /method: ifsa
  - override /model: csp_lda
  - _self_

experiment_name: ifsa_v13_tg_beta1_partial

method:
  target_beta: 1.0
  mean_mode: logeuclid
  ref_subject_mean_mode: logeuclid

  cov_trace_norm: false
  cov_shrink_alpha: 0.0
  lambda_damp: 0.0
  damp_mode: euclid_ema

  lambda_spec: 0.0
  lambda_u: 0.0
  output_space: reference

  # More conservative (avoid overfitting to short online prefix).
  ema_alpha: 1.0
  k_steps: 10
  lr: 0.15
  lambda_track: 1.0

  trigger_mode: fixed

