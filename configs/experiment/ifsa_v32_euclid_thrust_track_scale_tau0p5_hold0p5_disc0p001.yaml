# @package _global_

defaults:
  - override /method: ifsa
  - override /model: csp_lda
  - _self_

experiment_name: ifsa_v32_euclid_thrust_track_scale_tau0p5_hold0p5_disc0p001

method:
  # v23 target-guided backbone + safety clutch (only change: thrust_mode=euclid).
  target_beta: 1.0
  mean_mode: logeuclid
  ref_subject_mean_mode: logeuclid

  cov_trace_norm: false
  cov_shrink_alpha: 0.0
  lambda_damp: 0.0
  damp_mode: euclid_ema

  lambda_spec: 0.0
  lambda_u: 0.0
  output_space: reference

  # v32 innovation: allow non-symmetric A (Euclid-thrust).
  thrust_mode: euclid

  ema_alpha: 1.0
  k_steps: 1
  lr: 0.3
  lambda_track: 4.0

  # Safety clutch: scale_gain, but force a hard hold when gate_factor is very
  # small (extreme OOD), with disc_loss guard to avoid false holds.
  safety_score_mode: track_error
  safety_mode: scale_gain
  safety_quantile: 0.90
  safety_tau_mult: 0.5
  safety_gain_min: 0.0
  safety_hold_gate_threshold: 0.5
  safety_disc_loss_tau: 0.001

  trigger_mode: fixed

