# @package _global_

defaults:
  - override /method: ifsa
  - override /model: csp_lda
  - _self_

experiment_name: ifsa_v16_tg_beta1_full_disp0p5

method:
  # Same backbone as v13 best-trans, plus dispersion matching.
  target_beta: 1.0
  mean_mode: logeuclid
  ref_subject_mean_mode: logeuclid

  cov_trace_norm: false
  cov_shrink_alpha: 0.0
  cov_log_spec_shrink: 0.0
  lambda_damp: 0.0
  damp_mode: euclid_ema

  lambda_spec: 0.0
  lambda_u: 0.0
  output_space: reference

  ema_alpha: 1.0
  k_steps: 1
  lr: 0.3
  lambda_track: 4.0

  # New: dispersion matching (target-guided, unlabeled).
  lambda_disp: 0.5
  disp_scale_min: 0.5
  disp_scale_max: 2.0

  trigger_mode: fixed

