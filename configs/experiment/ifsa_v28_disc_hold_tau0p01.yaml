# @package _global_

defaults:
  - override /method: ifsa
  - override /model: csp_lda
  - _self_

experiment_name: ifsa_v28_disc_hold_tau0p01

method:
  # v13 target-guided backbone (log-Euclidean).
  target_beta: 1.0
  mean_mode: logeuclid
  ref_subject_mean_mode: logeuclid

  cov_trace_norm: false
  cov_shrink_alpha: 0.0
  lambda_damp: 0.0
  damp_mode: euclid_ema

  lambda_spec: 0.0
  lambda_u: 0.0
  output_space: reference

  ema_alpha: 1.0
  k_steps: 1
  lr: 0.3
  lambda_track: 4.0

  trigger_mode: fixed

  # v28: disc-loss safety clutch (hold only) to avoid strong negative transfer.
  safety_score_mode: disc_loss
  safety_mode: hold_identity
  safety_tau_mult: 0.01
