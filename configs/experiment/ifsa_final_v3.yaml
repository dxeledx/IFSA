# @package _global_

defaults:
  - override /method: ifsa
  - override /model: csp_lda
  - _self_

experiment_name: ifsa_final_v3

method:
  # Final IFSA v3: Final v2 + disc-loss EA fallback (cross-dataset robustness).
  target_beta: 1.0
  mean_mode: logeuclid
  ref_subject_mean_mode: logeuclid

  cov_trace_norm: false
  cov_shrink_alpha: 0.0
  lambda_damp: 0.0
  damp_mode: euclid_ema

  lambda_spec: 0.0
  lambda_u: 0.0
  output_space: reference

  thrust_mode: euclid
  a_mix_mode: euclid

  ema_alpha: 1.0
  k_steps: 1
  lr: 0.3
  lambda_track: 4.0

  safety_score_mode: track_error
  safety_mode: scale_gain
  safety_quantile: 0.90
  safety_tau_mult: 0.7
  safety_gain_min: 0.0
  safety_hold_gate_threshold: 0.6
  safety_disc_loss_tau: 0.001

  safety_low_score_mult: 0.6

  # New: disc-loss EA fallback (source-label only; target still unlabeled).
  safety_disc_fallback_mode: ea
  safety_disc_fallback_ratio_min: 0.85
  safety_disc_fallback_tau: 0.01
  safety_disc_fallback_max_trials_per_class: 200

  trigger_mode: fixed

