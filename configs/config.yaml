defaults:
  - dataset: bci_iv_2a
  - preprocess: default_mi
  - protocol: loso
  - method: identity
  - model: csp_lda
  - runtime: default
  - experiment: base
  - _self_

eval:
  compute_baseline: true
  baseline_method: identity
  # Optional: parallelize per-subject alignment inside a fold (helps large datasets
  # like PhysioNetMI without blowing up memory by running many folds in parallel).
  subject_n_jobs: 1
  # Optional: call gc + malloc_trim between folds to avoid RSS growth.
  trim_memory: false

hydra:
  run:
    dir: runs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  job:
    chdir: false
